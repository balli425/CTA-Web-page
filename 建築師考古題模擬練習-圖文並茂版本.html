                                                key={key}
                                                onClick={() => setSelectedSubject(key)}
                                                className={`py-3 px-4 rounded-xl border-2 transition text-left flex justify-between items-center ${selectedSubject === key ? 'border-indigo-500 bg-indigo-50 text-indigo-700 font-bold shadow-md' : 'border-slate-100 hover:border-slate-200 bg-white'}`}
                                            >
                                                <span>{data.name}</span>
                                                <span className="text-sm font-normal text-slate-400">共 {data.questions.length} 題</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold mb-3 flex items-center gap-2 text-slate-600">
                                        <Timer size={18} /> 考試模式
                                    </label>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button 
                                            onClick={() => setMode('practice')}
                                            className={`py-3 px-4 rounded-xl border-2 transition ${mode === 'practice' ? 'border-indigo-500 bg-indigo-50 text-indigo-700 font-bold' : 'border-slate-100 hover:border-slate-200'}`}
                                        >
                                            普通練習
                                        </button>
                                        <button 
                                            onClick={() => setMode('exam')}
                                            className={`py-3 px-4 rounded-xl border-2 transition ${mode === 'exam' ? 'border-indigo-500 bg-indigo-50 text-indigo-700 font-bold' : 'border-slate-100 hover:border-slate-200'}`}
                                        >
                                            模擬考 (120分)
                                        </button>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold mb-3 flex items-center gap-2 text-slate-600">
                                        <ClipboardList size={18} /> 回饋方式
                                    </label>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button 
                                            onClick={() => setFeedbackMode('immediate')}
                                            className={`py-3 px-4 rounded-xl border-2 transition ${feedbackMode === 'immediate' ? 'border-indigo-500 bg-indigo-50 text-indigo-700 font-bold' : 'border-slate-100 hover:border-slate-200'}`}
                                        >
                                            即時知道答案
                                        </button>
                                        <button 
                                            onClick={() => setFeedbackMode('end')}
                                            className={`py-3 px-4 rounded-xl border-2 transition ${feedbackMode === 'end' ? 'border-indigo-500 bg-indigo-50 text-indigo-700 font-bold' : 'border-slate-100 hover:border-slate-200'}`}
                                        >
                                            最後統一檢討
                                        </button>
                                    </div>
                                </div>

                                <button 
                                    onClick={startQuiz}
                                    className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200 flex items-center justify-center gap-2 mt-4"
                                >
                                    開始測驗 <ChevronRight size={20} />
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameState === 'quiz') {
                const q = currentQuestions[currentIdx];
                const isCorrect = userAnswers[currentIdx] === q.a;

                return (
                    <div className={`min-h-screen p-4 pt-24 transition-colors duration-1000 ${isDarkMode ? 'dark-exam-mode' : ''}`}>
                        <CTABanner isDark={isDarkMode} />
                        <div className="max-w-3xl mx-auto">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex items-center gap-4">
                                    <button onClick={() => setGameState('setup')} className="p-2 hover:bg-slate-200 rounded-full transition" title="返回首頁">
                                        <Home size={20} />
                                    </button>
                                    <span className="font-bold text-lg">題號 {currentIdx + 1} / {currentQuestions.length}</span>
                                </div>
                                <div className="flex items-center gap-3">
                                    {mode === 'exam' && (
                                        <div className={`flex items-center gap-2 px-4 py-2 rounded-full font-mono font-bold ${isDarkMode ? 'bg-red-900/40 text-red-200' : 'bg-white shadow-sm'}`}>
                                            <Timer size={18} className={timeLeft <= 600 ? 'animate-pulse text-red-400' : ''} />
                                            {formatTime(timeLeft)}
                                        </div>
                                    )}
                                    <button 
                                        onClick={() => setShowConfirmModal(true)} 
                                        className="flex items-center gap-1 px-4 py-2 rounded-full font-bold bg-red-100 text-red-600 hover:bg-red-200 transition text-sm shadow-sm"
                                    >
                                        <Flag size={16} />
                                        忍痛放棄
                                    </button>
                                </div>
                            </div>

                            {showConfirmModal && (
                                <div className="fixed inset-0 bg-black/50 z-[200] flex items-center justify-center p-4">
                                    <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
                                        <h3 className="text-xl font-bold mb-2 text-slate-800">確定要放棄嗎？</h3>
                                        <p className="text-slate-500 mb-6">這將會結束目前的測驗並直接計算分數。</p>
                                        <div className="flex gap-3 justify-end">
                                            <button 
                                                onClick={() => setShowConfirmModal(false)}
                                                className="px-4 py-2 rounded-xl bg-slate-100 font-bold hover:bg-slate-200 text-slate-700 transition"
                                            >
                                                繼續考試
                                            </button>
                                            <button 
                                                onClick={() => {
                                                    setShowConfirmModal(false);
                                                    setGameState('result');
                                                }}
                                                className="px-4 py-2 rounded-xl bg-red-600 text-white font-bold hover:bg-red-700 shadow-md transition"
                                            >
                                                確定交卷
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="h-2 bg-slate-200 rounded-full mb-8 overflow-hidden">
                                <div className="h-full bg-indigo-500 progress-bar" style={{ width: `${((currentIdx + 1) / currentQuestions.length) * 100}%` }}></div>
                            </div>

                            <div className={`bg-white rounded-3xl p-8 shadow-sm border border-slate-100 card ${showExplanation ? 'ring-2 ' + (isCorrect ? 'ring-green-400' : 'ring-red-400') : ''}`}>
                                
                                {q.imgId && (
                                    <div className="mb-6 rounded-xl overflow-hidden border-2 border-slate-100 bg-white flex justify-center items-center p-4">
                                        <ExamImage imgId={q.imgId} />
                                    </div>
                                )}

                                <h2 className="text-xl md:text-2xl font-medium mb-8 leading-relaxed">
                                    {q.q}
                                </h2>

                                <div className="space-y-4">
                                    {q.o.map((opt, i) => {
                                        const char = ['A', 'B', 'C', 'D'][i];
                                        const isSelected = userAnswers[currentIdx] === char;
                                        
                                        let btnClass = "w-full text-left p-4 rounded-2xl border-2 transition-all option-button flex justify-between items-center ";
                                        if (showExplanation) {
                                            if (char === q.a) btnClass += "border-green-500 bg-green-50 text-green-700 ";
                                            else if (isSelected) btnClass += "border-red-500 bg-red-50 text-red-700 ";
                                            else btnClass += "border-slate-100 opacity-50 ";
                                        } else {
                                            btnClass += isSelected ? "border-indigo-500 bg-indigo-50 text-indigo-700 font-bold" : "border-slate-100 hover:border-indigo-200 hover:bg-slate-50";
                                        }

                                        return (
                                            <button 
                                                key={char} 
                                                disabled={showExplanation}
                                                onClick={() => handleAnswer(char)}
                                                className={btnClass}
                                            >
                                                <span>({char}) {opt}</span>
                                                {showExplanation && char === q.a && <CheckCircle2 size={20} className="text-green-500" />}
                                                {showExplanation && isSelected && char !== q.a && <XCircle size={20} className="text-red-500" />}
                                            </button>
                                        );
                                    })}
                                </div>

                                {showExplanation && (
                                    <div className="mt-8 animate-in fade-in slide-in-from-bottom-2">
                                        <div className={`p-4 rounded-xl flex items-start gap-3 ${isCorrect ? 'bg-green-50 text-green-800' : 'bg-red-50 text-red-800'}`}>
                                            <AlertCircle className="shrink-0 mt-1" size={20} />
                                            <div>
                                                <p className="font-bold">{isCorrect ? '太棒了，回答正確！' : `回答錯誤，正確答案是 (${q.a})`}</p>
                                            </div>
                                        </div>
                                        <button 
                                            onClick={nextQuestion}
                                            className="w-full mt-6 bg-slate-800 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-slate-900 transition shadow-lg"
                                        >
                                            下一題 <ChevronRight size={20} />
                                        </button>
                                    </div>
                                )}
                            </div>
                            
                            {feedbackMode === 'end' && (
                                <div className="mt-8 flex justify-between gap-4">
                                    <button 
                                        disabled={currentIdx === 0}
                                        onClick={() => setCurrentIdx(currentIdx - 1)}
                                        className="px-6 py-3 rounded-xl border border-slate-200 bg-white font-medium hover:bg-slate-50 disabled:opacity-30 card shadow-sm"
                                    >
                                        上一題
                                    </button>
                                    <button 
                                        onClick={nextQuestion}
                                        className="px-8 py-3 rounded-xl bg-indigo-600 text-white font-bold hover:bg-indigo-700 shadow-md"
                                    >
                                        {currentIdx === currentQuestions.length - 1 ? '交卷查看結果' : '下一題'}
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (gameState === 'result') {
                const score = calculateScore();
                const maxScore = qData[selectedSubject].maxScore;
                const scorePercent = (score / maxScore) * 100;
                const feedback = getFeedbackMessage(scorePercent);
                
                let correctCount = 0;
                currentQuestions.forEach((q, i) => { if (userAnswers[i] === q.a) correctCount++; });

                return (
                    <div className="min-h-screen bg-slate-50 p-6 pt-24">
                        <CTABanner isDark={false} />
                        <div className="max-w-4xl mx-auto">
                            <div className="bg-white rounded-3xl p-10 shadow-xl text-center card border border-slate-100 mb-10">
                                <div className="inline-flex items-center justify-center p-6 bg-indigo-100 text-indigo-600 rounded-full mb-6">
                                    <Award size={64} />
                                </div>
                                <h1 className="text-4xl font-bold mb-2">測驗結果</h1>
                                <p className="text-slate-500 mb-8">114年度 - {qData[selectedSubject].name}</p>
                                
                                <div className="flex justify-center gap-8 mb-6">
                                    <div className="text-center">
                                        <p className="text-slate-400 text-sm uppercase tracking-wider font-bold">總得分</p>
                                        <p className="text-5xl font-black text-indigo-600">{score}<span className="text-2xl text-slate-400 font-normal"> / {maxScore}</span></p>
                                    </div>
                                    <div className="w-px bg-slate-100"></div>
                                    <div className="text-center">
                                        <p className="text-slate-400 text-sm uppercase tracking-wider font-bold">答對題數</p>
                                        <p className="text-5xl font-black text-slate-800">
                                            {correctCount}<span className="text-2xl text-slate-400 font-normal"> / {currentQuestions.length}</span>
                                        </p>
                                    </div>
                                </div>

                                <div className={`border-2 rounded-xl py-3 px-6 inline-block font-bold mb-10 ${feedback.color}`}>
                                    {feedback.text}
                                </div>

                                <div className="grid grid-cols-2 gap-4 max-w-lg mx-auto">
                                    <button 
                                        onClick={() => setGameState('setup')}
                                        className="flex items-center justify-center gap-2 py-4 rounded-2xl bg-slate-100 text-slate-700 font-bold hover:bg-slate-200 transition"
                                    >
                                        <RefreshCcw size={20} /> 返回首頁
                                    </button>
                                    <button 
                                        onClick={() => window.scrollTo({top: 800, behavior: 'smooth'})}
                                        className="flex items-center justify-center gap-2 py-4 rounded-2xl bg-indigo-600 text-white font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition"
                                    >
                                        <ClipboardList size={20} /> 逐題檢討
                                    </button>
                                </div>
                            </div>

                            <div className="space-y-6 pb-20">
                                <h3 className="text-2xl font-bold mb-4 flex items-center gap-2">
                                    <ClipboardList className="text-indigo-500" /> 詳細檢討
                                </h3>
                                {currentQuestions.map((q, i) => {
                                    const userAns = userAnswers[i];
                                    const isCorrect = userAns === q.a;
                                    return (
                                        <div key={i} className={`bg-white p-6 rounded-2xl border-l-8 shadow-sm flex flex-col gap-4 card ${isCorrect ? 'border-green-400' : 'border-red-400'}`}>
                                            <div className="flex justify-between items-center">
                                                <span className="font-bold text-slate-400">第 {i+1} 題</span>
                                                {isCorrect ? (
                                                    <span className="text-green-600 flex items-center gap-1 font-bold bg-green-50 px-3 py-1 rounded-full text-sm"><CheckCircle2 size={16}/> 正確</span>
                                                ) : (
                                                    <span className="text-red-600 flex items-center gap-1 font-bold bg-red-50 px-3 py-1 rounded-full text-sm"><XCircle size={16}/> 錯誤</span>
                                                )}
                                            </div>
                                            
                                            {q.imgId && (
                                                <div className="mt-2 mb-4 p-4 bg-slate-50 border rounded-xl flex justify-center bg-white">
                                                    <ExamImage imgId={q.imgId} />
                                                </div>
                                            )}

                                            <p className="font-medium leading-relaxed">{q.q}</p>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-sm mt-2">
                                                {q.o.map((opt, j) => {
                                                    const char = ['A','B','C','D'][j];
                                                    let optClass = "p-3 rounded-xl border ";
                                                    if (char === q.a) optClass += "bg-green-50 border-green-200 text-green-700 font-bold";
                                                    else if (char === userAns) optClass += "bg-red-50 border-red-200 text-red-700";
                                                    else optClass += "border-slate-100 text-slate-600";
                                                    return (
                                                        <div key={j} className={optClass}>
                                                            ({char}) {opt}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                            <div className="text-xs text-slate-400 border-t pt-3 flex justify-between">
                                                <span>你的選擇：{userAns || '未填寫'}</span>
                                                <span>標準答案：{q.a}</span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
