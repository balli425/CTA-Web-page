<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

<body>
    <div class="background-animation"></div>
    
    <main class="container">
        <header class="header">
            <div class="badge">CTA AI 私人秘書</div>
            <h1>建築師考古題模擬系統</h1>
            <p>請選擇您要進行測驗的版本，開啟專屬您的刷動態解題體驗。</p>

        <div class="card-grid">
            <!-- Card 1 -->
            <a href="建築師考古題模擬練習.html" class="glass-card primary-card">
                <div class="card-content">
                    <div class="icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    </div>
                    <h2>標準模擬練習</h2>
                    <p>標準題庫練習介面，適合快速刷題與自我測驗考科熟練度。具備高效率的單純作答體驗。</p>
                    <span class="btn-text">開始測驗 <span class="arrow">→</span></span>

                <div class="card-bg"></div>
            </a>

            <!-- Card 2 -->
            <a href="建築師考古題模擬練習-圖文並茂版本.html" class="glass-card secondary-card">
                <div class="card-content">
                    <div class="icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>

                    <h2>圖文並茂版本</h2>
                    <p>加入圖表與圖像的豐富排版，更適合需要依賴視覺線索的題型，讓您圖解輕鬆讀。</p>
                    <span class="btn-text">開始測驗 <span class="arrow">→</span></span>
                </div>
                <div class="card-bg"></div>
            </a>
        </div>
